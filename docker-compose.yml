services:
  orchestrator:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: research-orchestrator-app
    ports:
      - "8876:8876"
    environment:
      ORCH_WORKSPACE: /workspace
      ORCH_PULL_MODE: auto
      ORCH_PULL_PROVIDER: ebscohost
      ORCH_AUTO_INGEST: "true"
      ORCH_AUTO_LLM_FIT: "true"
      ORCH_LLM_BACKEND: ollama
      ORCH_OLLAMA_BASE_URL: http://host.docker.internal:11434
    volumes:
      - ../:/workspace
      - ./data:/srv/app/data
    restart: unless-stopped

