services:
  orchestrator:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: research-orchestrator-app
    ports:
      - "8876:8876"
    env_file:
      - .env
    environment:
      ORCH_WORKSPACE: /workspace
      ORCH_PLAYWRIGHT_CDP_URL: ${ORCH_PLAYWRIGHT_CDP_URL:-http://host.docker.internal:9222}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./:/workspace
      - ./data:/srv/app/data
    restart: unless-stopped
